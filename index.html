 <!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TrackMentor</title>

<style>

body{
margin:0;
font-family:Arial;
background:#06142b;
color:white;
text-align:center;
}

.topbar{
position:fixed;
right:20px;
top:20px;
}

.langbtn{
margin-left:5px;
padding:6px 10px;
border:none;
background:#334155;
color:white;
border-radius:6px;
cursor:pointer;
}

header{
padding:120px 20px 80px 20px;
}

.logo{
width:120px;
margin-bottom:20px;
}

h1{
font-size:56px;
margin-bottom:10px;
}

h2{
color:#cbd5e1;
font-weight:normal;
}

p{
color:#cbd5e1;
}

.download{
background:#facc15;
border:none;
padding:18px 36px;
font-size:22px;
border-radius:14px;
cursor:pointer;
margin-top:30px;
}

section{
padding:80px 20px;
max-width:900px;
margin:auto;
}

.card{
background:#0f172a;
border:1px solid #334155;
padding:30px;
border-radius:20px;
margin-top:30px;
line-height:30px;
}

footer{
padding:60px;
color:#64748b;
}

</style>

</head>

<body>


<div class="topbar">
<button class="langbtn" onclick="setLang('zh')">中文</button>
<button class="langbtn" onclick="setLang('en')">EN</button>
</div>


<header>

<img src="logo.png" class="logo">

<h1 id="title">TrackMentor</h1>

<h2 id="subtitle">AI Racing Coach for Sim Racing</h2>

<p id="desc">Upload your lap. Get AI coaching. Improve your racing.</p>

<a href="你的GoogleDrive下載連結" target="_blank">
<button class="download" id="downloadbtn">Download Beta</button>
</a>

</header>


<section>

<h2 id="featuretitle">Features</h2>

<div class="card" id="features">

AI Analysis Report<br><br>

AI Coach Chat<br><br>

Car Setup Suggestions<br><br>

Performance History<br><br>

Multi Game Support

</div>

</section>


<footer>

TrackMentor • Analyze. Coach. Improve.

</footer>



<script>

function setLang(lang){

if(lang=="zh"){

document.getElementById("subtitle").innerText="模擬賽車 AI 教練";

document.getElementById("desc").innerText="上傳你的單圈影片，AI分析你的駕駛並提供教練建議。";

document.getElementById("downloadbtn").innerText="下載測試版";

document.getElementById("featuretitle").innerText="功能";

document.getElementById("features").innerHTML=
"AI 分析報告<br><br>"+
"AI 教練聊天室<br><br>"+
"車輛調校建議<br><br>"+
"成績與歷史紀錄<br><br>"+
"多遊戲支援";

}

if(lang=="en"){

document.getElementById("subtitle").innerText="AI Racing Coach for Sim Racing";

document.getElementById("desc").innerText="Upload your lap. Get AI coaching. Improve your racing.";

document.getElementById("downloadbtn").innerText="Download Beta";

document.getElementById("featuretitle").innerText="Features";

document.getElementById("features").innerHTML=
"AI Analysis Report<br><br>"+
"AI Coach Chat<br><br>"+
"Car Setup Suggestions<br><br>"+
"Performance History<br><br>"+
"Multi Game Support";

}

}

</script>


</body>
</html>
